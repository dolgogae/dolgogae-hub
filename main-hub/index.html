<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dolgogae HUB</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7252750535082394"
     crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: #07070f; overflow-x: hidden; }

    .blob {
      position: absolute;
      border-radius: 9999px;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: blob 8s ease-in-out infinite;
    }
    @keyframes blob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(40px, -30px) scale(1.1); }
      66%       { transform: translate(-20px, 20px) scale(0.95); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .glass-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.25s ease;
      animation: fadeUp 0.5s ease-out forwards;
    }
    .glass-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(168,85,247,0.5);
      transform: translateY(-4px);
      box-shadow: 0 0 32px rgba(168,85,247,0.2), 0 20px 40px rgba(0,0,0,0.4);
    }
    .glass-card:hover .card-title  { color: #c084fc; }
    .glass-card:hover .card-footer { color: #a855f7; }
    .glass-card:hover .arrow-icon  { transform: translate(3px, -3px); }

    .gradient-text {
      background: linear-gradient(135deg, #a855f7 0%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tag-pill {
      background: rgba(168,85,247,0.15);
      border: 1px solid rgba(168,85,247,0.3);
      color: #c084fc;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 9999px;
    }
    .arrow-icon { transition: transform 0.2s ease; }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col">

  <!-- Background blobs -->
  <div class="blob w-96 h-96 bg-purple-600" style="top:-80px;left:-100px;"></div>
  <div class="blob w-80 h-80 bg-cyan-500"   style="top:200px;right:-60px;animation-delay:3s;"></div>
  <div class="blob w-64 h-64 bg-violet-700" style="bottom:100px;left:40%;animation-delay:5s;"></div>

  <!-- Header -->
  <header class="relative z-10 px-6 py-6">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-black"
             style="background:linear-gradient(135deg,#a855f7,#22d3ee);">D</div>
        <span class="font-bold text-lg tracking-tight">Dolgogae HUB</span>
      </div>
      <span class="text-xs text-white/30 font-medium tracking-widest uppercase">Portfolio</span>
    </div>
  </header>

  <!-- Hero -->
  <section class="relative z-10 px-6 pt-16 pb-16 text-center">
    <div class="max-w-2xl mx-auto">
      <h1 class="text-5xl sm:text-6xl font-black leading-tight">
        <span class="gradient-text">Dolgogae</span> HUB
      </h1>
    </div>
  </section>

  <!-- ─────────────────────────────────────────
       사이트 카드 목록
       새 카드를 추가할 때는 아래 <a> 블록을 복사해서
       붙여넣고 href / 이모지 / 제목 / 설명 / 태그를 수정하세요.
       자세한 방법은 GUIDE.md를 참고하세요.
  ───────────────────────────────────────── -->
  <main class="relative z-10 max-w-5xl mx-auto px-6 pb-24 flex-1">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

      <!-- CARD: Claude Guide -->
      <a href="https://claude.guide.dolgogae.cloud"
         target="_blank" rel="noopener noreferrer"
         class="glass-card rounded-2xl p-6 flex flex-col gap-4 cursor-pointer group">
        <div class="flex items-start justify-between">
          <span class="text-4xl leading-none">🤖</span>
          <span class="tag-pill">Guide</span>
        </div>
        <div class="flex-1">
          <h2 class="card-title font-bold text-base text-white mb-1.5 transition-colors">Claude Guide</h2>
          <p class="text-sm text-white/45 leading-relaxed">Claude를 더 잘 활용하기 위한 가이드 사이트.</p>
        </div>
        <div class="card-footer flex items-center gap-1.5 text-xs text-white/25 transition-colors font-medium">
          <span>claude.guide.dolgogae.cloud</span>
          <svg class="arrow-icon w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 17L17 7M17 7H7M17 7v10" />
          </svg>
        </div>
      </a>
      <!-- /CARD -->

    </div>

  </main>

  <!-- Footer -->
  <footer class="relative z-10 py-8 text-center border-t border-white/5">
    <a href="/privacy-policy"
       class="inline-block text-xs text-purple-300 hover:text-purple-200 border border-purple-500/50 hover:border-purple-400 rounded-full px-5 py-2 transition-all duration-200 hover:bg-purple-500/10">
      개인정보처리방침
    </a>
  </footer>

</body>
</html>
